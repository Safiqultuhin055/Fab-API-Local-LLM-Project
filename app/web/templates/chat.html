<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>AI Gateway · Chat</title>
  <style>
    :root{
      --bg:#ffffff;--side:#f9f9f9;--side-line:#ececec;--ink:#0d0d0d;--muted:#8e8ea0;
      --line:#e5e5e5;--accent:#0d0d0d;--user:#f4f4f4;--code:#0d1117;--green:#10a37f;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%}
    body{font:15.5px/1.7 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--ink);background:var(--bg);display:flex;height:100vh;overflow:hidden}

    /* sidebar */
    aside{width:260px;flex:0 0 auto;background:var(--side);border-right:1px solid var(--side-line);
      display:flex;flex-direction:column;padding:8px}
    .s-item{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:9px;cursor:pointer;
      font-size:14px;color:#0d0d0d;font-weight:500;border:0;background:none;width:100%;text-align:left}
    .s-item:hover{background:#ececec}
    .s-item svg{width:18px;height:18px;flex:0 0 auto;stroke:#0d0d0d}
    .s-sec{font-size:12px;color:var(--muted);padding:14px 10px 6px;font-weight:600}
    .recents{flex:1;overflow-y:auto;margin-top:2px}
    .recent{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;cursor:pointer;
      font-size:13.5px;color:#3c3c43;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .recent:hover{background:#ececec}
    .recent.active{background:#e3e3e6}
    .recent .x{margin-left:auto;opacity:0;color:#9b9b9b;font-size:15px;line-height:1}
    .recent:hover .x{opacity:1}
    .userbar{display:flex;align-items:center;gap:10px;padding:10px;border-top:1px solid var(--side-line);margin-top:4px}
    .userbar .av{width:32px;height:32px;border-radius:50%;background:#2563eb;color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px}
    .userbar b{font-size:13.5px;display:block}.userbar span{font-size:11.5px;color:var(--muted)}

    /* main */
    main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 18px}
    .modelpick{display:flex;align-items:center;gap:8px;font-weight:600;font-size:15px;
      padding:7px 12px;border-radius:10px;cursor:pointer;border:0;background:none}
    .modelpick:hover{background:#f0f0f0}
    .modelpick select{border:0;background:none;font:inherit;font-weight:600;cursor:pointer}
    .topbar .gear{width:36px;height:36px;border-radius:9px;border:0;background:none;cursor:pointer;display:grid;place-items:center}
    .topbar .gear:hover{background:#f0f0f0}

    .scroll{flex:1;overflow-y:auto}
    .thread{max-width:760px;margin:0 auto;padding:20px 20px 160px;width:100%}

    /* empty greeting */
    .hero{height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
    .hero h1{font-size:30px;font-weight:600;margin:0}

    /* messages */
    .msg{display:flex;gap:16px;padding:22px 0}
    .msg .av{width:30px;height:30px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;color:#fff;font-size:12px;font-weight:700}
    .msg.user .av{background:#2563eb}
    .msg.assistant .av{background:var(--green)}
    .msg .who{font-weight:600;font-size:14px;margin-bottom:3px}
    .md{min-width:0;flex:1;overflow-wrap:anywhere}
    .md p{margin:0 0 12px}.md ul,.md ol{margin:0 0 12px;padding-left:24px}.md li{margin:3px 0}
    .md h1,.md h2,.md h3{margin:16px 0 8px;line-height:1.3}.md h1{font-size:21px}.md h2{font-size:18px}.md h3{font-size:16px}
    .md a{color:#2563eb;text-decoration:underline}
    .md code.inline{background:#f0f0f1;padding:2px 6px;border-radius:5px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13.5px}
    .md pre{background:var(--code);border-radius:11px;margin:0 0 14px;overflow:hidden}
    .md pre .bar{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;background:#161b22;color:#c9d1d9;font-size:12px}
    .md pre .bar button{background:none;border:0;color:#c9d1d9;cursor:pointer;font-size:12px;display:flex;gap:5px;align-items:center}
    .md pre code{display:block;padding:14px 16px;overflow-x:auto;color:#e6edf3;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13.5px;line-height:1.55}
    .md blockquote{border-left:3px solid #d0d0d7;margin:0 0 12px;padding:2px 14px;color:#555}
    .md table{border-collapse:collapse;margin:0 0 12px;font-size:14px}.md th,.md td{border:1px solid var(--line);padding:6px 10px}
    .cursor::after{content:'●';color:var(--green);margin-left:2px;animation:blink 1s steps(2) infinite;font-size:11px;vertical-align:middle}
    @keyframes blink{50%{opacity:.2}}
    .meta{color:var(--muted);font-size:12px;margin-top:8px;display:flex;gap:10px;align-items:center}
    .meta button{border:0;background:none;cursor:pointer;color:var(--muted);font-size:12px}
    .meta button:hover{color:#0d0d0d}

    /* composer */
    .composer{position:absolute;left:0;right:0;bottom:0;padding:0 20px 22px;
      background:linear-gradient(180deg,rgba(255,255,255,0),#fff 38%)}
    .composer .inner{max-width:760px;margin:0 auto}
    .err{background:#fee2e2;color:#b91c1c;padding:9px 14px;border-radius:12px;font-size:13.5px;margin-bottom:8px;display:none}
    .pill{display:flex;align-items:flex-end;gap:8px;background:#fff;border:1px solid #d9d9e3;border-radius:28px;
      padding:9px 9px 9px 8px;box-shadow:0 2px 14px rgba(0,0,0,.07)}
    .pill .rnd{width:36px;height:36px;border-radius:50%;border:0;background:none;cursor:pointer;display:grid;place-items:center;flex:0 0 auto}
    .pill .rnd:hover{background:#f0f0f0}
    .pill .rnd.rec{background:rgba(239,68,68,.14)}
    .pill .rnd.rec svg{stroke:#ef4444}
    .pill .rnd.rec{animation:micpulse 1.1s ease-in-out infinite}
    @keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.45)}50%{box-shadow:0 0 0 7px rgba(239,68,68,0)}}
    .reclabel{display:none;align-items:center;gap:7px;color:#ef4444;font-size:12px;font-weight:600;margin-bottom:6px}
    .reclabel.on{display:flex}
    .reclabel .blip{width:9px;height:9px;border-radius:50%;background:#ef4444;animation:micpulse 1.1s infinite}
    .pill textarea{flex:1;border:0;resize:none;max-height:200px;padding:8px 4px;font:inherit;font-size:16px;background:transparent}
    .pill textarea:focus{outline:none}
    .pill .send{width:38px;height:38px;border-radius:50%;border:0;background:#0d0d0d;color:#fff;cursor:pointer;display:grid;place-items:center;flex:0 0 auto}
    .pill .send:hover{background:#2b2b2b}
    .pill .send:disabled{background:#d9d9e3;color:#fff;cursor:not-allowed}
    .foot{text-align:center;color:var(--muted);font-size:11.5px;margin-top:9px}
    .plusmenu{display:none;position:absolute;left:0;bottom:54px;width:330px;background:#fff;
      border:1px solid #e5e5e5;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.16);padding:6px;z-index:20}
    .plusmenu.open{display:block}
    .mitem{display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;border:0;background:none;
      padding:10px 12px;border-radius:10px;cursor:pointer;font:inherit}
    .mitem:hover{background:#f4f4f5}
    .mitem>span{font-size:18px;line-height:1.3}
    .mitem b{font-size:13.5px;display:block}
    .mitem .d{font-size:11.5px;color:#8e8ea0;display:block}

    /* modal */
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;place-items:center;z-index:40}
    .modal.open{display:grid}
    .modal .card{background:#fff;border-radius:16px;padding:24px;width:440px;max-width:92vw}
    .modal h3{margin:0 0 4px}.modal p{color:var(--muted);font-size:13px;margin:0 0 16px}
    .modal label{font-size:12px;font-weight:600}
    .modal input{width:100%;padding:11px 13px;border:1px solid #d9d9e3;border-radius:10px;margin:6px 0 16px;font:inherit}
    .modal .row{display:flex;gap:10px;justify-content:flex-end}
    .btn{padding:10px 16px;border:0;border-radius:10px;font-weight:600;cursor:pointer;background:#0d0d0d;color:#fff}
    .btn.ghost{background:#ececec;color:#0d0d0d}
    @media(max-width:820px){aside{display:none}}
  </style>
</head>
<body>
  <aside>
    <button class="s-item" id="newchat" style="font-weight:600">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg>
      New chat
    </button>
    <button class="s-item" id="searchbtn">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      Search chats
    </button>
    <a class="s-item" href="/admin/ui" target="_blank">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
      Dashboard
    </a>
    <a class="s-item" href="/admin/ui/models" target="_blank">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 2l8 4.5v9L12 20l-8-4.5v-9z"/><path d="M12 11l8-4.5M12 11v9M12 11L4 6.5"/></svg>
      Models
    </a>
    <a class="s-item" href="/docs" target="_blank">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M4 4h11l5 5v11H4z"/><path d="M14 4v5h5"/></svg>
      API Docs
    </a>
    <div class="s-sec">Recents</div>
    <div class="recents" id="recents"></div>
    <div class="userbar">
      <div class="av" id="uav">U</div>
      <div style="flex:1"><b id="uname">Local User</b><span>AI Gateway · Free</span></div>
      <button class="rnd s-item" style="width:auto;padding:6px" id="gear2" title="Settings">⚙</button>
    </div>
  </aside>

  <main>
    <div class="topbar">
      <button class="modelpick">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#0d0d0d" stroke-width="2"><path d="M12 2l8 4.5v9L12 20l-8-4.5v-9z"/></svg>
        <select id="model"><option>{{ default_model }}</option></select>
      </button>
      <button class="gear" id="settings" title="API key"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#0d0d0d" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 13a7.6 7.6 0 000-2l2-1.5-2-3.5-2.4 1a7.6 7.6 0 00-1.7-1L14.8 3H9.2l-.5 2.5a7.6 7.6 0 00-1.7 1l-2.4-1-2 3.5 2 1.5a7.6 7.6 0 000 2l-2 1.5 2 3.5 2.4-1a7.6 7.6 0 001.7 1l.5 2.5h5.6l.5-2.5a7.6 7.6 0 001.7-1l2.4 1 2-3.5z"/></svg></button>
    </div>

    <div class="scroll" id="scroll">
      <div class="thread" id="thread">
        <div class="hero" id="hero"><h1>Ready to dive in?</h1></div>
      </div>
    </div>

    <div class="composer">
      <div class="inner">
        <div class="err" id="err"></div>
        <div class="reclabel" id="reclabel"><span class="blip"></span>Listening… speak now (then review &amp; send)</div>
        <div id="imgchip" style="display:none;align-items:center;gap:10px;margin-bottom:8px;padding:8px;background:#f4f4f5;border-radius:12px;width:fit-content">
          <img id="imgthumb" style="width:46px;height:46px;object-fit:cover;border-radius:8px" alt="">
          <span id="imgname" style="font-size:12.5px;color:#444"></span>
          <button id="imgremove" type="button" style="border:0;background:#e5e5e5;border-radius:7px;cursor:pointer;padding:3px 8px">✕</button>
        </div>
        <div class="toast" id="toast" style="display:none;margin-bottom:8px;padding:9px 13px;border-radius:11px;font-size:13px;background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0"></div>
        <div class="pill" style="position:relative">
          <button class="rnd" id="plus" title="Add files, images & tools"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#0d0d0d" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button>
          <div class="plusmenu" id="plusmenu">
            <button type="button" class="mitem" id="m_kb"><span>📎</span><div><b>Add file to Knowledge Base</b><span class="d">.txt .md .csv .json — RAG can answer from it</span></div></button>
            <button type="button" class="mitem" id="m_img"><span>🖼️</span><div><b>Attach image (Vision)</b><span class="d">ask about an image (vision model)</span></div></button>
            <button type="button" class="mitem" id="m_new"><span>➕</span><div><b>New chat</b><span class="d">start a fresh conversation</span></div></button>
          </div>
          <input type="file" id="fileKb" accept=".txt,.md,.markdown,.csv,.json,.log" hidden>
          <input type="file" id="fileImg" accept="image/*" hidden>
          <button class="rnd" id="kb" title="Default is RAG-first (knowledge base, then model). Click to force knowledge-base ONLY." style="font-size:17px">📚</button>
          <button class="rnd" id="mic" title="Voice to text (speak, then review &amp; send)">
            <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="#0d0d0d" stroke-width="2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0014 0M12 18v3"/></svg>
          </button>
          <select id="lang" title="Voice language" style="border:0;background:none;font-size:12px;color:#6b7280;padding:4px 2px;cursor:pointer">
            <option value="en-US">EN</option><option value="bn-BD">বাংলা</option>
          </select>
          <textarea id="input" rows="1" placeholder="Ask anything"></textarea>
          <button class="send" id="send" title="Send"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button>
        </div>
        <div class="foot">Powered by local Ollama via AI Gateway · responses may be inaccurate</div>
      </div>
    </div>
  </main>

  <div class="modal" id="modal">
    <div class="card">
      <h3>Settings</h3>
      <p>Stored only in this browser.</p>
      <label>Your name</label>
      <input id="dispname" placeholder="Local User">
      <label>API Key (X-API-KEY)</label>
      <input id="apikey" type="password" placeholder="AI-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
      <div class="row"><button class="btn ghost" id="closeSettings">Cancel</button><button class="btn" id="saveSettings">Save</button></div>
    </div>
  </div>

<script>
const $=s=>document.querySelector(s);
const thread=$('#thread'),scroll=$('#scroll'),input=$('#input'),sendBtn=$('#send'),
      modelSel=$('#model'),errBox=$('#err'),recentsEl=$('#recents');
let streaming=false;

/* ---------- storage ---------- */
const LS={get k(){return localStorage.getItem('ai_gw_key')||''},
  set k(v){localStorage.setItem('ai_gw_key',v)},
  get name(){return localStorage.getItem('ai_gw_name')||'Local User'},
  set name(v){localStorage.setItem('ai_gw_name',v)},
  get convos(){try{return JSON.parse(localStorage.getItem('ai_gw_convos')||'[]')}catch(e){return[]}},
  set convos(v){localStorage.setItem('ai_gw_convos',JSON.stringify(v))},
  get active(){return localStorage.getItem('ai_gw_active')||''},
  set active(v){localStorage.setItem('ai_gw_active',v)}};
function uid(){return 'c'+Math.random().toString(36).slice(2,9)+Date.now().toString(36)}

/* ---------- markdown (mini, safe) ---------- */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function mdInline(s){
  return s
    .replace(/`([^`]+)`/g,(_,c)=>`<code class="inline">${c}</code>`)
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*]+)\*/g,'$1<em>$2</em>')
    .replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
}
function renderMd(src){
  // fenced code blocks first
  const blocks=[]; src=src.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>{
    const i=blocks.length; blocks.push({lang,code}); return `␀B${i}␀`;
  });
  const lines=src.split('\n'); let html='',i=0;
  while(i<lines.length){
    let ln=lines[i];
    const ph=ln.match(/^␀B(\d+)␀$/);
    if(ph){const b=blocks[+ph[1]];
      html+=`<pre><div class="bar"><span>${esc(b.lang||'code')}</span><button onclick="copyCode(this)">⧉ Copy</button></div><code>${esc(b.code.replace(/\n$/,''))}</code></pre>`;i++;continue;}
    if(/^#{1,3}\s/.test(ln)){const lvl=ln.match(/^#+/)[0].length;html+=`<h${lvl}>${mdInline(esc(ln.replace(/^#+\s/,'')))}</h${lvl}>`;i++;continue;}
    if(/^\s*>\s?/.test(ln)){let buf=[];while(i<lines.length&&/^\s*>\s?/.test(lines[i])){buf.push(esc(lines[i].replace(/^\s*>\s?/,'')));i++;}html+=`<blockquote>${mdInline(buf.join('<br>'))}</blockquote>`;continue;}
    if(/^\s*[-*]\s+/.test(ln)){let buf=[];while(i<lines.length&&/^\s*[-*]\s+/.test(lines[i])){buf.push(`<li>${mdInline(esc(lines[i].replace(/^\s*[-*]\s+/,'')))}</li>`);i++;}html+=`<ul>${buf.join('')}</ul>`;continue;}
    if(/^\s*\d+\.\s+/.test(ln)){let buf=[];while(i<lines.length&&/^\s*\d+\.\s+/.test(lines[i])){buf.push(`<li>${mdInline(esc(lines[i].replace(/^\s*\d+\.\s+/,'')))}</li>`);i++;}html+=`<ol>${buf.join('')}</ol>`;continue;}
    if(ln.trim()===''){i++;continue;}
    let buf=[];while(i<lines.length&&lines[i].trim()!==''&&!/^␀B\d+␀$/.test(lines[i])&&!/^#{1,3}\s|^\s*[-*]\s+|^\s*\d+\.\s+|^\s*>\s?/.test(lines[i])){buf.push(esc(lines[i]));i++;}
    html+=`<p>${mdInline(buf.join('<br>'))}</p>`;
  }
  return html;
}
function copyCode(btn){const code=btn.closest('pre').querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(()=>{const o=btn.innerHTML;btn.textContent='✓ Copied';setTimeout(()=>btn.innerHTML=o,1300)})}
function copyText(t,btn){navigator.clipboard.writeText(t).then(()=>{const o=btn.textContent;btn.textContent='✓ Copied';setTimeout(()=>btn.textContent=o,1300)})}

/* ---------- conversation state ---------- */
function current(){return LS.convos.find(c=>c.id===LS.active)}
function saveMsg(role,content){
  let cs=LS.convos,c=cs.find(x=>x.id===LS.active);
  if(!c){c={id:uid(),title:'New chat',messages:[]};cs.unshift(c);LS.active=c.id;}
  c.messages.push({role,content});
  if(role==='user'&&(c.title==='New chat'||!c.title))c.title=content.slice(0,40);
  LS.convos=cs; renderRecents();
}
function updateLastAssistant(content){
  let cs=LS.convos,c=cs.find(x=>x.id===LS.active);if(!c)return;
  const last=c.messages[c.messages.length-1];
  if(last&&last.role==='assistant')last.content=content;else c.messages.push({role:'assistant',content});
  LS.convos=cs;
}
function renderRecents(){
  const cs=LS.convos;
  recentsEl.innerHTML=cs.map(c=>`<div class="recent ${c.id===LS.active?'active':''}" data-id="${c.id}">
    <span style="flex:1;overflow:hidden;text-overflow:ellipsis">${esc(c.title||'New chat')}</span>
    <span class="x" data-del="${c.id}">×</span></div>`).join('')||'<div style="padding:8px 10px;color:#b0b0b8;font-size:13px">No chats yet</div>';
}
function renderThread(){
  const c=current();
  if(!c||!c.messages.length){thread.innerHTML='<div class="hero" id="hero"><h1>'+greeting()+'</h1></div>';return;}
  thread.innerHTML='';
  c.messages.forEach(m=>drawMsg(m.role,m.content));
  scroll.scrollTop=scroll.scrollHeight;
}
function greeting(){const n=LS.name&&LS.name!=='Local User'?(', '+LS.name.split(' ')[0]):'';return 'Hey'+n+'. Ready to dive in?';}

function drawMsg(role,content){
  const hero=$('#hero');if(hero)hero.remove();
  const m=document.createElement('div');m.className='msg '+role;
  m.innerHTML=`<div class="av">${role==='user'?'U':'AI'}</div>
    <div style="flex:1;min-width:0"><div class="who">${role==='user'?(LS.name||'You'):'Assistant'}</div>
    <div class="md"></div></div>`;
  const body=m.querySelector('.md');
  if(role==='user')body.innerHTML='<p>'+esc(content).replace(/\n/g,'<br>')+'</p>';
  else body.innerHTML=renderMd(content);
  thread.appendChild(m);return body;
}

/* ---------- UI events ---------- */
$('#settings').onclick=$('#gear2').onclick=()=>{$('#apikey').value=LS.k;$('#dispname').value=LS.name;$('#modal').classList.add('open')};
$('#closeSettings').onclick=()=>$('#modal').classList.remove('open');
$('#saveSettings').onclick=()=>{LS.k=$('#apikey').value.trim();LS.name=($('#dispname').value.trim()||'Local User');$('#modal').classList.remove('open');loadModels();applyUser();renderThread();showErr('')};
function newChat(){LS.active='';renderThread();renderRecents();input.focus()}
$('#newchat').onclick=newChat;

/* ---- "+" tools menu ---- */
let pendingImage=null;  // data URL when an image is attached
const pmenu=$('#plusmenu');
$('#plus').onclick=e=>{e.stopPropagation();pmenu.classList.toggle('open')};
document.addEventListener('click',e=>{if(!pmenu.contains(e.target)&&e.target!==$('#plus'))pmenu.classList.remove('open')});
$('#m_new').onclick=()=>{pmenu.classList.remove('open');newChat()};
$('#m_kb').onclick=()=>{pmenu.classList.remove('open');$('#fileKb').click()};
$('#m_img').onclick=()=>{pmenu.classList.remove('open');$('#fileImg').click()};

function toast(msg,ok=true){const t=$('#toast');t.textContent=msg;
  t.style.background=ok?'#ecfdf5':'#fee2e2';t.style.color=ok?'#065f46':'#b91c1c';
  t.style.borderColor=ok?'#a7f3d0':'#fecaca';t.style.display='block';
  setTimeout(()=>t.style.display='none',5000);}

/* add file -> knowledge base */
$('#fileKb').onchange=async e=>{
  const f=e.target.files[0];if(!f)return;
  if(!LS.k){showErr('Set API key first (⚙).');$('#settings').click();return}
  toast('Uploading "'+f.name+'" to knowledge base…');
  const fd=new FormData();fd.append('file',f);
  try{
    const r=await fetch('/v1/rag/documents',{method:'POST',headers:{'X-API-KEY':LS.k},body:fd});
    const j=await r.json();
    if(!r.ok)throw new Error((j.error&&j.error.message)||'upload failed');
    toast('✓ Added "'+j.filename+'" — knowledge base now has '+j.chunks+' chunks. Ask about it!');
  }catch(err){toast('Upload failed: '+err.message,false)}
  e.target.value='';
};

/* attach image (vision) */
$('#fileImg').onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{pendingImage=rd.result;
    $('#imgthumb').src=pendingImage;$('#imgname').textContent=f.name;$('#imgchip').style.display='flex';
    input.placeholder='Ask about this image…';input.focus();};
  rd.readAsDataURL(f);e.target.value='';
};
$('#imgremove').onclick=()=>{pendingImage=null;$('#imgchip').style.display='none';
  input.placeholder=ragMode?'Ask your knowledge base (RAG)…':'Ask anything'};
let ragMode=false;
$('#kb').onclick=()=>{ragMode=!ragMode;const b=$('#kb');
  b.style.background=ragMode?'rgba(16,163,127,.15)':'none';
  b.style.boxShadow=ragMode?'inset 0 0 0 2px #10a37f':'none';
  input.placeholder=ragMode?'Ask your knowledge base (RAG)…':'Ask anything';};
$('#searchbtn').onclick=()=>{const q=prompt('Search chats:');if(q==null)return;const f=LS.convos.find(c=>(c.title||'').toLowerCase().includes(q.toLowerCase()));if(f){LS.active=f.id;renderThread();renderRecents()}};
recentsEl.onclick=e=>{const del=e.target.dataset.del;if(del){LS.convos=LS.convos.filter(c=>c.id!==del);if(LS.active===del)LS.active='';renderRecents();renderThread();return}
  const r=e.target.closest('.recent');if(r){LS.active=r.dataset.id;renderRecents();renderThread()}};
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,200)+'px'});
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
sendBtn.onclick=send;
function showErr(m){errBox.textContent=m;errBox.style.display=m?'block':'none'}
function applyUser(){const n=LS.name||'Local User';$('#uname').textContent=n;$('#uav').textContent=(n[0]||'U').toUpperCase()}

/* ---------- models ---------- */
async function loadModels(){
  if(!LS.k)return;
  try{const r=await fetch('/v1/models',{headers:{'X-API-KEY':LS.k}});if(!r.ok)return;
    const d=await r.json();const names=(d.models||[]).map(m=>m.name).filter(Boolean);
    if(names.length)modelSel.innerHTML=names.map(n=>`<option ${n===d.default_model?'selected':''}>${n}</option>`).join('');
  }catch(e){}
}

/* ---------- send + stream ---------- */
async function send(){
  if(streaming)return;
  if(window.stopMic)window.stopMic();   // end voice capture on submit
  const text=input.value.trim();if(!text)return;
  if(!LS.k){showErr('Set your API key first (⚙).');$('#settings').click();return}
  showErr('');
  if(!current())  {LS.active='';}            // start fresh convo on first msg
  const ubody=drawMsg('user',text);saveMsg('user',text);
  if(pendingImage){const im=document.createElement('img');im.src=pendingImage;
    im.style.cssText='max-width:240px;border-radius:10px;margin-top:8px;display:block';ubody.appendChild(im);}
  input.value='';input.style.height='auto';scroll.scrollTop=scroll.scrollHeight;

  const body=drawMsg('assistant','');body.classList.add('cursor');
  saveMsg('assistant','');
  const t0=performance.now();streaming=true;sendBtn.disabled=true;
  let answer='';
  try{
    // Routing: image attached -> vision chat (model). Otherwise RAG-first
    // (/v1/rag/smart/stream): knowledge base first, auto-fallback to model.
    // 📚 = force knowledge-base only.
    const img=pendingImage;
    const endpoint=img?'/v1/chat/stream':(ragMode?'/v1/rag/stream':'/v1/rag/smart/stream');
    const reqBody={model:modelSel.value,prompt:text,temperature:0.3};
    if(img)reqBody.images=[img];
    let answerMode=img?'vision':null;
    if(img){pendingImage=null;$('#imgchip').style.display='none';input.placeholder=ragMode?'Ask your knowledge base (RAG)…':'Ask anything';}
    const resp=await fetch(endpoint,{method:'POST',
      headers:{'X-API-KEY':LS.k,'Content-Type':'application/json'},
      body:JSON.stringify(reqBody)});
    if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error((e.error&&e.error.message)||('HTTP '+resp.status))}
    const reader=resp.body.getReader(),dec=new TextDecoder();let buf='';
    while(true){const {done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});const parts=buf.split('\n\n');buf=parts.pop();
      for(const p of parts){const line=p.trim();if(!line.startsWith('data:'))continue;
        const data=line.slice(5).trim();if(data==='[DONE]')continue;
        try{const j=JSON.parse(data);if(j.error)throw new Error(j.error);
          if(j.meta){answerMode=j.meta.mode;}            // smart route: kb vs model
          if(j.token){answer+=j.token;body.innerHTML=renderMd(answer);body.classList.add('cursor');scroll.scrollTop=scroll.scrollHeight}
        }catch(err){if(err.message&&err.message!=='Unexpected end of JSON input')throw err}
      }
    }
    body.classList.remove('cursor');body.innerHTML=renderMd(answer);
    updateLastAssistant(answer);
    const secs=((performance.now()-t0)/1000).toFixed(1);
    const meta=document.createElement('div');meta.className='meta';
    const badge=answerMode==='knowledge_base'
      ? '<span style="color:#10a37f">📚 from knowledge base</span> · '
      : answerMode==='vision' ? '<span style="color:#a855f7">🖼️ vision</span> · '
      : (answerMode==='model' ? '<span style="color:#6366f1">🧠 from model</span> · ' : '');
    meta.innerHTML=`${badge}<span>${modelSel.value} · ${secs}s</span>`;
    const copy=document.createElement('button');copy.textContent='⧉ Copy';copy.onclick=()=>copyText(answer,copy);
    meta.appendChild(copy);body.after(meta);
  }catch(e){body.classList.remove('cursor');showErr('Error: '+e.message);
    if(!answer){body.innerHTML='<p style="color:#b91c1c">⚠ '+esc(e.message)+'</p>'}updateLastAssistant(answer)}
  finally{streaming=false;sendBtn.disabled=false;input.focus();renderRecents()}
}

/* ---------- voice to text (Web Speech API) ---------- */
(function(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const micBtn=$('#mic'),label=$('#reclabel'),langSel=$('#lang');
  if(!SR){ micBtn.title='Voice input not supported in this browser (use Chrome/Edge)';
    micBtn.style.opacity=.4; return; }
  let rec=null,recording=false,baseText='';
  function start(){
    rec=new SR();rec.lang=langSel.value;rec.continuous=true;rec.interimResults=true;
    baseText=input.value?input.value.trim()+' ':'';
    rec.onresult=e=>{
      let interim='',final='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        const t=e.results[i][0].transcript;
        if(e.results[i].isFinal)final+=t;else interim+=t;
      }
      if(final)baseText+=final+' ';
      input.value=(baseText+interim).trimStart();
      input.dispatchEvent(new Event('input'));   // autoresize
    };
    rec.onerror=ev=>{ if(ev.error==='not-allowed'||ev.error==='service-not-allowed')
        showErr('Microphone blocked. Allow mic access in the browser.'); stop(); };
    rec.onend=()=>{ if(recording){ try{rec.start();}catch(e){stop();} } }; // keep alive until user stops
    try{ rec.start(); }catch(e){ return; }
    recording=true;micBtn.classList.add('rec');label.classList.add('on');input.focus();
  }
  function stop(){ recording=false;micBtn.classList.remove('rec');label.classList.remove('on');
    if(rec){ try{rec.stop();}catch(e){} rec=null; } }
  micBtn.onclick=()=>recording?stop():start();
  langSel.onclick=e=>e.stopPropagation();
  window.stopMic=stop;   // send() calls this to end recording on submit
})();

/* ---------- init ---------- */
applyUser();renderRecents();renderThread();
if(!LS.k)$('#settings').click();else loadModels();
</script>
</body>
</html>
