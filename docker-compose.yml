# Local AI Gateway stack.
# Ollama runs on the HOST (recommended) — the gateway reaches it via
# host.docker.internal. Set OLLAMA_BASE_URL accordingly.
services:
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    environment:
      # Override so the container reaches host-run Ollama.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      RATE_LIMIT_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - gateway
    restart: unless-stopped

  # Optional SQL Server for prod parity. Uncomment + set DATABASE_URL.
