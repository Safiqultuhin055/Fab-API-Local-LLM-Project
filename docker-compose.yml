# Local AI Gateway stack.
# Ollama runs on the HOST (recommended) — the gateway reaches it via
# host.docker.internal. Set OLLAMA_BASE_URL accordingly.
services:
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    environment:
      # Override so the container reaches host-run Ollama.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      RATE_LIMIT_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      # SQL Server selection (all read from .env; listed for visibility).
      # A LAN IP like 192.168.153.248 is reachable from the container as-is.
      # If SQL Server runs on the DOCKER HOST instead, set MSSQL_HOST=host.docker.internal.
      MSSQL_HOST: ${MSSQL_HOST:-}
      MSSQL_PORT: ${MSSQL_PORT:-1433}
      MSSQL_DATABASE: ${MSSQL_DATABASE:-ai_gateway}
      MSSQL_USER: ${MSSQL_USER:-sa}
      MSSQL_PASSWORD: ${MSSQL_PASSWORD:-}
      MSSQL_DRIVER: ${MSSQL_DRIVER:-ODBC Driver 18 for SQL Server}
    ports:
      # Host 8009 -> container 8000. Reach the API at http://localhost:8009
      # (or via nginx on :80). Container-internal port stays 8000.
      - "8009:8000"
    volumes:
      # Persist RAG knowledge-base writes across container restarts. The SQLite
      # fallback (only used if SQL Server is unreachable) stays container-local.
      - ./rag:/app/rag
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - gateway
    restart: unless-stopped

  # Optional SQL Server for prod parity. Uncomment + set DATABASE_URL.
  # mssql:
  #   image: mcr.microsoft.com/mssql/server:2022-latest
  #   environment:
  #     ACCEPT_EULA: "Y"
  #     SA_PASSWORD: "Your_Strong_Passw0rd"
  #   ports:
  #     - "1433:1433"
  #   restart: unless-stopped
