# Local AI Gateway stack.
# Ollama runs on the HOST (recommended) — the gateway reaches it via
# host.docker.internal. Set OLLAMA_BASE_URL accordingly.
services:
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    environment:
      # Container must reach the HOST's Ollama, not its own localhost. Hardcoded
      # (not ${OLLAMA_BASE_URL:-…}) because compose would otherwise interpolate
      # the .env value http://localhost:11434, which inside the container points
      # at the container itself -> empty model list.
      #
      # The gateway auto-picks its Ollama URL by machine (see resolve_ollama_base_url):
      # inside a container the host-detection never matches PELE_IP (the container
      # has its own IP), so it always takes the REMOTE branch. Point that at the
      # host's Ollama so a container on pele still reaches host Ollama.
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_REMOTE_URL: http://host.docker.internal:11434
      RATE_LIMIT_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      # NOTE: MSSQL_* are intentionally NOT set here. `environment:` overrides
      # `env_file:`, and `${MSSQL_HOST:-}` reads the HOST SHELL (unset on the
      # server) -> injects an EMPTY MSSQL_HOST that blanks the .env value, so the
      # app thinks SQL Server is "not configured" and silently uses container-
      # local SQLite. Leaving them out lets env_file (.env) supply them, so the
      # container writes to the real SQL Server at 192.168.153.248.
      # (If SQL Server runs on the DOCKER HOST itself, set MSSQL_HOST=host.docker.internal in .env.)
    ports:
      # Host 8009 -> container 8000. Reach the API at http://localhost:8009
      # (or via nginx on :80). Container-internal port stays 8000.
      - "8009:8000"
    volumes:
      # Persist RAG knowledge-base writes across container restarts. The SQLite
      # fallback (only used if SQL Server is unreachable) stays container-local.
      - ./rag:/app/rag
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - gateway
    restart: unless-stopped

  # Optional SQL Server for prod parity. Uncomment + set DATABASE_URL.
  # mssql:
  #   image: mcr.microsoft.com/mssql/server:2022-latest
  #   environment:
  #     ACCEPT_EULA: "Y"
  #     SA_PASSWORD: "Your_Strong_Passw0rd"
  #   ports:
  #     - "1433:1433"
  #   restart: unless-stopped
