# Reverse proxy for the gateway. TLS-ready; tuned for SSE streaming.
upstream ai_gateway {
    server gateway:8000;
}

server {
    listen 80;
    server_name _;

    # Security headers (gateway also sets these; kept here as defense-in-depth).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    location / {
        proxy_pass http://ai_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming-friendly: disable buffering so SSE tokens flush immediately.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # For TLS, add a 443 server block with ssl_certificate / ssl_certificate_key
    # and redirect 80 -> 443.
}
